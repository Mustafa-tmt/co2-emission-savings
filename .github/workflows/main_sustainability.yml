# Next.js standalone → Azure Linux Web App (see next.config.ts output: "standalone")
#
# Azure portal (you configure, not this file):
#   - Application settings: DB_*, NEXT_PUBLIC_APP_URL, WEBSITE_NODE_DEFAULT_VERSION ~22 (or match CI Node)
#   - PostgreSQL firewall: Web App outbound IPs or "Azure services"
#   - Optional GitHub repo Variables: AZURE_RESOURCE_GROUP, AZURE_WEBAPP_NAME (exact App Service name)
#
# https://nextjs.org/docs/app/building-your-application/deploying#nodejs-server

name: Build and deploy Node.js app to Azure Web App - sustainability

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Avoid overlapping deploys (two pushes → one clean deployment)
concurrency:
  group: azure-webapp-sustainability
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      # Standalone output omits client chunks unless copied here
      - name: Assemble standalone deployment bundle
        run: |
          mkdir -p .next/standalone/.next/static
          if [ -d .next/static ] && [ "$(ls -A .next/static 2>/dev/null)" ]; then
            cp -r .next/static/. .next/standalone/.next/static/
          fi
          rm -f .next/standalone/.env .next/standalone/.env.*
          test -f .next/standalone/server.js || { echo "::error::Missing .next/standalone/server.js — is output: 'standalone' set in next.config?"; exit 1; }

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    env:
      # One place for the name used by az + webapps-deploy (override via repo Variable)
      APP_SERVICE_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'sustainability' }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D2EBB9F3E6ED427AAAFF8EB60FD6F18D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A47D3F4C247B447C924B317CD6D75031 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CD638EA33A474EFEAA31C9D927015A18 }}

      # OneDeploy returns 403 "Site Disabled" if the Web App (or SCM) is stopped.
      - name: Ensure Web App is started
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -e
          WEBAPP="${APP_SERVICE_NAME}"
          if [ -n "${AZURE_RESOURCE_GROUP}" ]; then
            RG="$AZURE_RESOURCE_GROUP"
          else
            RG=$(az webapp list --query "[?name=='${WEBAPP}'].resourceGroup | [0]" -o tsv)
          fi
          if [ -z "$RG" ] || [ "$RG" = "null" ]; then
            echo "::error::Could not find resource group for Web App '${WEBAPP}'."
            echo "Set GitHub repo Variable AZURE_RESOURCE_GROUP (e.g. sustainability-group) or AZURE_WEBAPP_NAME to the exact name under App Service → Overview."
            exit 1
          fi
          echo "Starting ${WEBAPP} in ${RG}..."
          az webapp start --name "$WEBAPP" --resource-group "$RG"
          echo "Waiting for SCM to accept deployment..."
          sleep 15

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          slot-name: "Production"
          package: .
          # Azure sets HOSTNAME; Next standalone binds incorrectly unless overridden
          startup-command: "HOSTNAME=0.0.0.0 node server.js"
