name: Fast Deploy Next.js to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # ✅ REQUIRED
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log and verify brand assets (repo checkout)
        run: |
          echo "::group::public/brand after checkout"
          ls -la public/brand/ || { echo "::error::public/brand missing"; exit 1; }
          echo "::endgroup::"
          test -f public/brand/tmt_logo_strapline_margin_on_white.png \
            || { echo "::error::Missing public/brand/tmt_logo_strapline_margin_on_white.png — not in repo or wrong path/case"; exit 1; }
          test -f public/brand/tmt_logo_strapline_margin_on_black.png \
            || { echo "::error::Missing public/brand/tmt_logo_strapline_margin_on_black.png"; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install deps
        run: npm ci --prefer-offline --no-audit

      - name: Build
        run: npm run build

      - name: Prepare standalone
        run: |
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/. .next/standalone/.next/static/
          # Next standalone can omit some public/ files (trace-only copy). Sync full public so Azure gets every asset.
          mkdir -p .next/standalone/public
          cp -r public/. .next/standalone/public/

      - name: Log and verify brand assets (standalone bundle)
        run: |
          echo "::group::.next/standalone (top level)"
          ls -la .next/standalone/
          echo "::endgroup::"
          echo "::group::.next/standalone/public/brand"
          ls -la .next/standalone/public/brand/ || { echo "::error::standalone bundle has no public/brand — check Next standalone output"; exit 1; }
          echo "::endgroup::"
          test -f .next/standalone/public/brand/tmt_logo_strapline_margin_on_white.png \
            || { echo "::error::White logo not in deploy bundle (.next/standalone/public/brand/)"; exit 1; }
          test -f .next/standalone/public/brand/tmt_logo_strapline_margin_on_black.png \
            || { echo "::error::Black logo not in deploy bundle"; exit 1; }

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D2EBB9F3E6ED427AAAFF8EB60FD6F18D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A47D3F4C247B447C924B317CD6D75031 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CD638EA33A474EFEAA31C9D927015A18 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: sustainability
          package: .next/standalone
          startup-command: "node server.js"
