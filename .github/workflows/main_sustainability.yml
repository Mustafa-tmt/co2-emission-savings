# Next.js standalone → Azure Linux Web App (see next.config.ts output: "standalone")
#
# Azure portal (you configure, not this file):
#   - Application settings: DB_*, NEXT_PUBLIC_APP_URL, WEBSITE_NODE_DEFAULT_VERSION ~22 (or match CI Node)
#   - PostgreSQL firewall: Web App outbound IPs or "Azure services"
#   - Optional GitHub repo Variables: AZURE_RESOURCE_GROUP, AZURE_WEBAPP_NAME
#     AZURE_WEBAPP_NAME must match App Service → Overview → Name (often like myapp-a1b2c3d4e5,
#     not the short name you typed at create). If deploy returns 403 Site Disabled, confirm this.
#
# Artifact: upload-artifact v4+ skips hidden files unless include-hidden-files: true
# (standalone needs .next/ with BUILD_ID; without it Azure only gets server.js and crashes).
#
# https://nextjs.org/docs/app/building-your-application/deploying#nodejs-server

name: Build and deploy Node.js app to Azure Web App - sustainability

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Avoid overlapping deploys (two pushes → one clean deployment)
concurrency:
  group: azure-webapp-sustainability
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      # Standalone output omits client chunks unless copied here
      - name: Assemble standalone deployment bundle
        run: |
          mkdir -p .next/standalone/.next/static
          if [ -d .next/static ] && [ "$(ls -A .next/static 2>/dev/null)" ]; then
            cp -r .next/static/. .next/standalone/.next/static/
          fi
          rm -f .next/standalone/.env .next/standalone/.env.*
          test -f .next/standalone/server.js || { echo "::error::Missing .next/standalone/server.js — is output: 'standalone' set in next.config?"; exit 1; }
          # upload-artifact v4+ excludes hidden paths by default — standalone needs .next/ (with BUILD_ID)
          test -f .next/standalone/.next/BUILD_ID || { echo "::error::Missing .next/standalone/.next/BUILD_ID after build"; exit 1; }

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          if-no-files-found: error
          # Required: standalone bundle includes hidden dir .next/ — without this, Azure gets server.js but no build
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    env:
      # Must match App Service → Overview → Name (same as *.azurewebsites.net prefix before the region suffix)
      APP_SERVICE_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'sustainability' }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify deployment bundle
        run: |
          test -f server.js || { echo "::error::Artifact missing server.js"; exit 1; }
          test -f .next/BUILD_ID || { echo "::error::Artifact missing .next/BUILD_ID (upload must use include-hidden-files: true)"; exit 1; }

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D2EBB9F3E6ED427AAAFF8EB60FD6F18D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A47D3F4C247B447C924B317CD6D75031 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CD638EA33A474EFEAA31C9D927015A18 }}

      # OneDeploy 403 "Site Disabled": stopped app, SCM not ready, run-from-package, or wrong app/slot name.
      - name: Prepare Web App for deployment
        id: azure-prep
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -e
          WEBAPP="${APP_SERVICE_NAME}"
          if [ -n "${AZURE_RESOURCE_GROUP}" ]; then
            RG="$AZURE_RESOURCE_GROUP"
          else
            RG=$(az webapp list --query "[?name=='${WEBAPP}'].resourceGroup | [0]" -o tsv)
          fi
          if [ -z "$RG" ] || [ "$RG" = "null" ]; then
            echo "::error::Could not find resource group for Web App '${WEBAPP}'."
            echo "Set GitHub Variable AZURE_RESOURCE_GROUP or AZURE_WEBAPP_NAME (exact name from App Service → Overview)."
            exit 1
          fi
          echo "rg=${RG}" >> "${GITHUB_OUTPUT}"
          echo "Using Web App: ${WEBAPP} | Resource group: ${RG}"
          STATE=$(az webapp show --name "$WEBAPP" --resource-group "$RG" --query state -o tsv)
          echo "Current state: ${STATE}"
          az webapp start --name "$WEBAPP" --resource-group "$RG"
          # Prebuilt zip: disable remote Oryx build; avoids SCM fighting OneDeploy
          az webapp config appsettings set --name "$WEBAPP" --resource-group "$RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false
          # Run-from-package URL mode can block normal zip deploy — clear if set
          az webapp config appsettings delete --name "$WEBAPP" --resource-group "$RG" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true
          az webapp restart --name "$WEBAPP" --resource-group "$RG"
          echo "Waiting for SCM / Kudu..."
          sleep 30

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          resource-group-name: ${{ steps.azure-prep.outputs.rg }}
          slot-name: production
          package: .
          clean: true
          restart: true
          startup-command: "HOSTNAME=0.0.0.0 node server.js"
